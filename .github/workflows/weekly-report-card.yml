name: Weekly Report Card

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  report-card:
    runs-on: ubuntu-latest

    env:
      HMAC_ALLOW_DEV_SECRET: "true"
      PYTHONPATH: "."

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          find . -name requirements.txt \
               -not -path './.venv/*' \
               -not -path './_archive/*' \
               -not -path './.*' \
            | while read f; do pip install -r "$f" --quiet || true; done
          pip install pytest pytest-cov --quiet

      - name: go/no-go compile check
        id: gonogo
        run: |
          set +e
          out=$(make go_no_go 2>&1)
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$out" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run core unit tests (fast Python-only subset)
        id: tests
        run: |
          set +e
          # Run the fast, pure-Python unit tests that don't need Docker or GPU
          out=$(python -m pytest \
            scripts/test_letta_agent.py \
            scripts/test_financial_awareness.py \
            scripts/test_error_codes.py \
            scripts/test_feature_flags.py \
            scripts/test_focus_compress.py \
            scripts/test_context_budget.py \
            scripts/test_p4_personality.py \
            scripts/test_p16_operational.py \
            scripts/test_p17_emotional_intelligence.py \
            scripts/test_p18_narrative_identity.py \
            scripts/test_p19_imagination_engine.py \
            scripts/test_p20_conscience_values.py \
            scripts/test_p21_proactive_agent.py \
            scripts/test_p22_operator_model.py \
            scripts/test_behavioral.py \
            --tb=no -q 2>&1)
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          # Extract pass/fail summary line
          summary=$(echo "$out" | grep -E "passed|failed|error" | tail -1)
          echo "summary=$summary" >> "$GITHUB_OUTPUT"
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$out" | tail -30 >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post Weekly Report Card issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          GONOGO_CODE: ${{ steps.gonogo.outputs.exit_code }}
          GONOGO_OUT: ${{ steps.gonogo.outputs.output }}
          TEST_CODE: ${{ steps.tests.outputs.exit_code }}
          TEST_SUMMARY: ${{ steps.tests.outputs.summary }}
          TEST_OUT: ${{ steps.tests.outputs.output }}
        run: |
          today=$(date -u +%Y-%m-%d)
          gonogo_icon=$( [ "$GONOGO_CODE" = "0" ] && echo "✅ PASS" || echo "🔴 FAIL" )
          test_icon=$(   [ "$TEST_CODE"   = "0" ] && echo "✅ PASS" || echo "🔴 FAIL" )

          overall="✅ All green"
          if [ "$GONOGO_CODE" != "0" ] || [ "$TEST_CODE" != "0" ]; then
            overall="🔴 Regressions detected — review before next PR"
          fi

          body="## Weekly Report Card — ${today}

> ${overall}

| Check | Result |
|-------|--------|
| go/no-go compile | ${gonogo_icon} |
| Unit test suite | ${test_icon} |

### go/no-go detail
\`\`\`
${GONOGO_OUT}
\`\`\`

### Unit test results
**${TEST_SUMMARY}**
\`\`\`
${TEST_OUT}
\`\`\`

---
_Generated by [Weekly Report Card](.github/workflows/weekly-report-card.yml) · close after review_"

          gh issue create \
            --repo "$REPO" \
            --title "Weekly Report Card — ${today}" \
            --body "$body" \
            --label "report-card" \
            || echo "::warning::Could not create issue (label may not exist yet)"
