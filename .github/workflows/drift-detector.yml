name: Weekly Drift Detector

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  drift-report:
    runs-on: ubuntu-latest
    steps:
      - name: Generate/update weekly drift report
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '<!-- weekly-drift-report -->';
            const title = 'Weekly drift report';
            const now = new Date();
            const DAY_MS = 24 * 60 * 60 * 1000;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner,
              repo,
              per_page: 100,
            });

            const staleBranches = [];
            for (const branch of branches) {
              const commit = await github.rest.repos.getCommit({
                owner,
                repo,
                ref: branch.name,
              });
              const commitDate = new Date(commit.data.commit.committer.date);
              const ageDays = Math.floor((now - commitDate) / DAY_MS);
              if (ageDays >= 30) {
                staleBranches.push(`- ${branch.name} (${ageDays} days since last commit)`);
              }
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const staleIssues = openIssues
              .filter((issue) => !issue.pull_request)
              .map((issue) => {
                const updated = new Date(issue.updated_at);
                const ageDays = Math.floor((now - updated) / DAY_MS);
                return { issue, ageDays };
              })
              .filter((x) => x.ageDays >= 60)
              .map((x) => `- #${x.issue.number} ${x.issue.title} (${x.ageDays} days inactivity)`);

            let statusPresent = true;
            try {
              await github.rest.repos.getContent({
                owner,
                repo,
                path: 'kai-pm/STATUS.md',
              });
            } catch (error) {
              if (error.status === 404) {
                statusPresent = false;
              } else {
                throw error;
              }
            }

            const lines = [
              marker,
              `Generated: ${now.toISOString()}`,
              '',
              '## Drift checks',
              `- kai-pm/STATUS.md present: ${statusPresent ? '✅ yes' : '❌ no'}`,
              '',
              '## Branches with no commits in 30+ days',
              staleBranches.length ? staleBranches.join('\n') : '- None',
              '',
              '## Issues with no activity in 60+ days',
              staleIssues.length ? staleIssues.join('\n') : '- None',
            ];

            const body = lines.join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }
