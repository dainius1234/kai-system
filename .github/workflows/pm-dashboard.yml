name: PM Dashboard

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read
  actions: read

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build and publish PM dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          title='📊 PM Dashboard — auto-updated daily'
          owner_ping='@dainius1234'
          todo_file='kai-pm/CLEANUP_TODO.md'

          labels=(
            'triage:keep'
            'triage:rebase'
            'triage:close'
            'cleanup-week-1'
            'cleanup-week-2'
            'cleanup-week-3'
            'drift-watch'
            'pm-blocked'
            'keystone'
            'salvage-later'
          )

          label_rows=''
          for label in "${labels[@]}"; do
            count=$(gh pr list --state open --search "label:\"${label}\"" --json number --limit 200 | jq 'length')
            label_rows+="| ${label} | ${count} |"$'\n'
          done
          total_open_prs=$(gh pr list --state open --json number --limit 200 | jq 'length')

          latest_ci=$(gh run list --branch main --limit 1 --json workflowName,status,conclusion,updatedAt,url | jq '.[0]')
          ci_name=$(jq -r '.workflowName // "n/a"' <<<"${latest_ci}")
          ci_status=$(jq -r '.status // "n/a"' <<<"${latest_ci}")
          ci_conclusion=$(jq -r '.conclusion // "n/a"' <<<"${latest_ci}")
          ci_url=$(jq -r '.url // ""' <<<"${latest_ci}")

          last_merge=$(gh pr list --state merged --base main --limit 1 --json mergedAt,number,url | jq '.[0]')
          merged_at=$(jq -r '.mergedAt // ""' <<<"${last_merge}")
          merge_ref=$(jq -r 'if .number then "#\(.number)" else "n/a" end' <<<"${last_merge}")
          merge_url=$(jq -r '.url // ""' <<<"${last_merge}")

          if [[ -n "${merged_at}" ]]; then
            days_since_merge=$(python3 -c "import datetime; m=datetime.datetime.fromisoformat('${merged_at}'.replace('Z','+00:00')); print((datetime.datetime.now(datetime.timezone.utc)-m).days)")
          else
            days_since_merge='unknown'
          fi

          read -r todo_added todo_removed <<<"$(git log --since='7 days ago' --numstat -- "${todo_file}" | awk 'NF==3 {a+=$1; d+=$2} END {print a+0, d+0}')"
          todo_delta="+${todo_added} / -${todo_removed}"

          unchecked_items=$(grep -E '^- \[ \]' "${todo_file}" | wc -l | tr -d '[:space:]')

          dashboard_issue=$(gh issue list --state all --search "${title} in:title" --json number,title,id --limit 20 | jq --arg t "${title}" '[.[] | select(.title == $t)][0]')
          issue_number=$(jq -r '.number // empty' <<<"${dashboard_issue}")
          issue_id=$(jq -r '.id // empty' <<<"${dashboard_issue}")

          if [[ -z "${issue_number}" ]]; then
            created=$(gh issue create --title "${title}" --body "Initializing dashboard..." --json number,id)
            issue_number=$(jq -r '.number' <<<"${created}")
            issue_id=$(jq -r '.id' <<<"${created}")
          fi

          gh api graphql \
            -f query='mutation($issueId:ID!){pinIssue(input:{issueId:$issueId}){issue{number}}}' \
            -F issueId="${issue_id}" >/dev/null 2>&1 || true

          blocked_notice='No blocker detected.'
          ping=''
          if [[ "${days_since_merge}" != 'unknown' ]] && [[ "${days_since_merge}" -gt 5 ]]; then
            blocked_notice='No merge to main in the last 5 days.'
            ping="${owner_ping} please review cleanup sequencing."
            gh issue edit "${issue_number}" --add-label "pm-blocked" >/dev/null || true
          fi

          ci_cell='n/a'
          if [[ -n "${ci_url}" ]]; then
            ci_cell="[${ci_name}](${ci_url}) — ${ci_status}/${ci_conclusion}"
          fi

          merge_cell='n/a'
          if [[ -n "${merge_url}" ]]; then
            merge_cell="[${merge_ref}](${merge_url})"
          fi

          body=$(cat <<EOF_BODY
          # 📊 PM Dashboard — auto-updated daily

          | Metric | Snapshot |
          |---|---|
          | Open PRs (total) | ${total_open_prs} |
          | Latest CI on main | ${ci_cell} |
          | Days since last merge to main | ${days_since_merge} |
          | Last merged PR | ${merge_cell} |
          | CLEANUP_TODO.md lines changed (7d) | ${todo_delta} |
          | Unchecked CLEANUP_TODO items | ${unchecked_items} |
          | Blocker watch | ${blocked_notice} |

          ## Open PRs by label

          | Label | Open PR count |
          |---|---|
          ${label_rows}

          ${ping}
          EOF_BODY
          )

          gh issue edit "${issue_number}" --body "${body}"
