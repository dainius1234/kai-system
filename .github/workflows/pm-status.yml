name: PM Status Check

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  pm-status:
    runs-on: ubuntu-latest
    steps:
      - name: Post/update PM checklist comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pm-status-check -->';
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });
            const changed = new Set(files.map((f) => f.filename));

            const statusTouched = changed.has('kai-pm/STATUS.md');
            const changelogTouched = changed.has('CHANGELOG.md');
            const testsHint = /test/i.test(pr.body || '') ? '⚠️ Mentioned in PR body (manual verification needed)' : '❓ Not declared in PR body';
            const sequenceReferenced = /SEQUENCE\.md|sequence step/i.test(pr.body || '');

            const body = `${marker}
            ## PM status checklist
            - Tests signal in PR body: ${testsHint}
            - \\`kai-pm/STATUS.md\\` touched: ${statusTouched ? '✅' : '❌'}
            - \\`CHANGELOG.md\\` touched: ${changelogTouched ? '✅' : '❌'}
            - Sequence step referenced in PR body: ${sequenceReferenced ? '✅' : '❌'}

            Please ensure PM docs and sequence mapping are accurate before merge.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
