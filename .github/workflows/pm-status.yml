name: PM Status Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  pm-status:
    runs-on: ubuntu-latest
    steps:
      - name: Post sticky PM checklist comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pm-status-checklist -->';
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const checksUrl = `https://github.com/${owner}/${repo}/pull/${pr.number}/checks`;

            const body = `${marker}
            ## PM status checklist
            - [ ] Tests green ([CI checks](${checksUrl}))
            - [ ] \`kai-pm/STATUS.md\` updated if in-flight scope changed
            - [ ] \`CHANGELOG.md\` \`[Unreleased]\` updated for user-visible changes
            - [ ] \`kai-pm/DECISIONS.md\` appended if architectural decision made
            - [ ] PR description references a \`SEQUENCE.md\` phase or jewel ID`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
