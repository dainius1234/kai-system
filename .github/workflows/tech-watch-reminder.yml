name: Tech Watch Reminder

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  tech-watch-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Open monthly tech-watch review issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const today = new Date().toISOString().slice(0, 10);
            const title = `Tech Watch — monthly review (${today})`;

            const body = [
              '- [ ] Review `kai-pm/TECH_WATCH.md` for stale entries (>90 days no update)',
              '- [ ] Check for new releases of: ollama, fastapi, pgvector, sentence-transformers, redis, prometheus',
              '- [ ] Add new candidates surfaced in last 30 days',
              '- [ ] Update verdicts (ADOPT / TRIAL / HOLD / REJECT)'
            ].join('\n');

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            if (existing.some((i) => !i.pull_request && i.title === title)) {
              core.info(`Issue already exists: ${title}`);
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ['pm', 'tech-watch'],
            });
