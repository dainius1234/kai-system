name: Friday Cleanup

on:
  schedule:
    - cron: '0 9 * * 5'   # Every Friday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  cleanup-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip flake8 pip-audit

      - name: Lint check
        id: lint
        run: |
          set +e
          out=$(flake8 . \
                  --count \
                  --max-line-length=120 \
                  --extend-ignore=E203,W503 \
                  --exclude=.venv,_archive,output,data \
                  --statistics 2>&1 | tail -20)
          code=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "${out:-No lint issues found.}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Dependency vulnerability scan
        id: depaudit
        run: |
          set +e
          # install all service requirements so pip-audit can see them
          find . -name requirements.txt \
               -not -path './.venv/*' \
               -not -path './_archive/*' \
               -not -path './.*' \
            | while read f; do pip install -r "$f" --quiet || true; done
          out=$(pip-audit --strict --desc 2>&1 | tail -30)
          code=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "${out:-No vulnerabilities found.}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Stale branch detection
        id: stale
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          today_epoch=$(date -u +%s)
          stale_list=""
          while IFS=$'\t' read -r name sha; do
            [ -z "$name" ] && continue
            [ "$name" = "main" ] && continue
            commit_date=$(gh api "repos/${REPO}/commits/${sha}" --jq '.commit.committer.date' 2>/dev/null || true)
            [ -z "$commit_date" ] && continue
            commit_epoch=$(date -u -d "$commit_date" +%s 2>/dev/null || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "$commit_date" +%s 2>/dev/null || true)
            [ -z "$commit_epoch" ] && continue
            age_days=$(( (today_epoch - commit_epoch) / 86400 ))
            if [ "$age_days" -ge 30 ]; then
              stale_list="${stale_list}- \`${name}\` — ${age_days}d old (last: ${commit_date%T*})\n"
            fi
          done < <(git for-each-ref --format='%(refname:short)%09%(objectname:short)' refs/remotes/origin/)

          if [ -z "$stale_list" ]; then
            stale_list="No stale branches (>30d old)."
          fi
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          printf "%b" "$stale_list" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Doc sync check
        id: docsync
        run: |
          set +e
          out=$(python3 scripts/sync_docs.py --check 2>&1)
          code=$?
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "${out:-Docs in sync.}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Post Friday cleanup issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          LINT_OUT: ${{ steps.lint.outputs.output }}
          LINT_CODE: ${{ steps.lint.outputs.exit_code }}
          DEP_OUT: ${{ steps.depaudit.outputs.output }}
          DEP_CODE: ${{ steps.depaudit.outputs.exit_code }}
          STALE_OUT: ${{ steps.stale.outputs.output }}
          DOCS_OUT: ${{ steps.docsync.outputs.output }}
          DOCS_CODE: ${{ steps.docsync.outputs.exit_code }}
        run: |
          today=$(date -u +%Y-%m-%d)
          lint_icon=$( [ "$LINT_CODE" = "0" ] && echo "✅" || echo "⚠️" )
          dep_icon=$(  [ "$DEP_CODE"  = "0" ] && echo "✅" || echo "🔴" )
          docs_icon=$( [ "$DOCS_CODE" = "0" ] && echo "✅" || echo "⚠️" )

          body="## Friday Cleanup Report — ${today}

### ${lint_icon} Lint (flake8)
\`\`\`
${LINT_OUT}
\`\`\`

### ${dep_icon} Dependency scan (pip-audit)
\`\`\`
${DEP_OUT}
\`\`\`

### 🌿 Stale branches (>30d)
${STALE_OUT}

### ${docs_icon} Doc sync check
\`\`\`
${DOCS_OUT}
\`\`\`

---
_Generated by [Friday Cleanup](.github/workflows/friday-cleanup.yml) · close this issue after reviewing_"

          gh issue create \
            --repo "$REPO" \
            --title "Friday Cleanup — ${today}" \
            --body "$body" \
            --label "maintenance" \
            || echo "::warning::Could not create issue (label may not exist yet)"
