name: Core Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    env:
      HMAC_ALLOW_DEV_SECRET: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-cov pip-audit
          # install each requirements.txt individually (skip hidden/archive dirs)
          find . -name requirements.txt \
               -not -path './.venv/*' \
               -not -path './_archive/*' \
               -not -path './.*' \
            | while read f; do pip install -r "$f" || true; done

      - name: Dependency vulnerability scan
        run: |
          pip-audit --strict --desc 2>/dev/null || echo "::warning::pip-audit found vulnerabilities"

      - name: Run core unit tests
        run: |
          make test-core

      - name: GitHub Models CI backend smoke test (best-effort)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # CI/tests-only LLM backend (D36) — gives a real model response
          # for test feedback instead of relying solely on the local
          # qwen2:0.5b stub. Free-tier/rate-limited by design (see
          # scripts/github_models_client.py), so failures here are a
          # warning, not a build-breaker.
          make test-github-models || echo "::warning::GitHub Models smoke test failed (likely rate-limited) — not build-breaking"

      - name: Build full stack Docker images
        run: |
          docker compose -f docker-compose.full.yml build

      - name: Scan container images for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

      - name: Bring up minimal sovereign AI stack
        run: |
          docker compose -f docker-compose.minimal.yml up -d --build
          # wait for tool-gate (fast) and agentic (waits on the ollama model
          # pull, so give it longer) to respond
          for i in {1..30}; do
            if curl -s http://localhost:8000/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          for i in {1..180}; do
            if curl -s http://localhost:8007/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          # memu-core-introspect — store-maintenance process split off memu-core
          # (see DECISIONS.md D21), independent of the ollama pull above
          for i in {1..30}; do
            if curl -s http://localhost:8009/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
      - name: Run integration smoke script
        run: |
          python3 scripts/test_core_integration.py
      - name: Tear down minimal stack
        run: |
          docker compose -f docker-compose.minimal.yml down
