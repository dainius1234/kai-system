version: '3.8'

networks:
  sovereign-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Shared defaults ─────────────────────────────────────────────────
x-service-defaults: &defaults
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 2G
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    image: pgvector/pgvector:pg15
    <<: *defaults
    environment:
      POSTGRES_DB: sovereign
      POSTGRES_USER: keeper
      POSTGRES_PASSWORD: "${DB_PASSWORD:-localdev}"
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keeper -d sovereign"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.2

  redis:
    image: redis:7-alpine
    <<: *defaults
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.4

  tool-gate:
    build:
      context: .
      dockerfile: tool-gate/Dockerfile
    <<: *defaults
    environment:
      MODE: "WORK"
      REQUIRED_CONFIDENCE: "0.7"
      REDIS_URL: redis://redis:6379
    secrets:
      - hmac_secret
      - bridge_secret
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.3
    depends_on:
      - postgres
      - redis

  memu-core:
    build:
      context: .
      dockerfile: memu-core/Dockerfile
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
      MAX_MEMORY_RECORDS: "5000"
      REDIS_URL: redis://redis:6379
      VECTOR_STORE: postgres
      PG_URI: postgresql://keeper:localdev@postgres:5432/sovereign
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.5
    depends_on:
      - redis
      - tool-gate
      - postgres

  heartbeat:
    build:
      context: .
      dockerfile: heartbeat/Dockerfile
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
      CHECK_INTERVAL: "60"
      ALERT_WINDOW: "300"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.6
    depends_on:
      - memu-core

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    <<: *defaults
    environment:
      TOOL_GATE_URL: http://tool-gate:8000
      MEMU_URL: http://memu-core:8001
      LANGGRAPH_URL: http://langgraph:8007
      EXECUTOR_URL: http://executor:8002
      HEARTBEAT_URL: http://heartbeat:8010
      SUPERVISOR_URL: http://supervisor:8051
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.7
    depends_on:
      - tool-gate
      - memu-core
      - langgraph
      - heartbeat

  supervisor:
    build:
      context: .
      dockerfile: supervisor/Dockerfile
    <<: *defaults
    environment:
      SWEEP_INTERVAL: "30"
      MEMU_URL: http://memu-core:8001
      TELEGRAM_ALERT_URL: http://telegram-bot:8025/alert
      PROACTIVE_INTERVAL: "900"
    ports:
      - "8051:8051"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8051/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.8
    depends_on:
      - memu-core
      - tool-gate
      - telegram-bot

  verifier:
    build:
      context: .
      dockerfile: verifier/Dockerfile
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
    ports:
      - "8052:8052"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8052/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.9
    depends_on:
      - memu-core

  fusion-engine:
    build:
      context: .
      dockerfile: fusion-engine/Dockerfile
    <<: *defaults
    environment:
      VERIFIER_URL: http://verifier:8052
    ports:
      - "8053:8053"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8053/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.10
    depends_on:
      - verifier

  langgraph:
    build:
      context: .
      dockerfile: langgraph/Dockerfile
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
      TOOL_GATE_URL: http://tool-gate:8000
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2:0.5b
      LLM_TIMEOUT: "120"
    secrets:
      - hmac_secret
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8007/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.11
    depends_on:
      - memu-core
      - redis
      - ollama

  executor:
    build:
      context: .
      dockerfile: executor/Dockerfile
    <<: *defaults
    environment:
      TOOL_GATE_URL: http://tool-gate:8000
      HEARTBEAT_URL: http://heartbeat:8010
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.12
    depends_on:
      - tool-gate
      - heartbeat

  memory-compressor:
    build:
      context: .
      dockerfile: memory-compressor/Dockerfile
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
      COMPRESSOR_INTERVAL_HOURS: "24"
    ports:
      - "8057:8057"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8057/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.18
    depends_on:
      - memu-core

  ledger-worker:
    build:
      context: .
      dockerfile: ledger-worker/Dockerfile
    <<: *defaults
    environment:
      TOOL_GATE_URL: http://tool-gate:8000
      HEARTBEAT_URL: http://heartbeat:8010
      LEDGER_VERIFY_INTERVAL: "60"
    ports:
      - "8056:8056"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8056/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.19
    depends_on:
      - tool-gate
      - heartbeat

  metrics-gateway:
    build:
      context: .
      dockerfile: metrics-gateway/Dockerfile
    <<: *defaults
    environment:
      METRICS_SCRAPE_INTERVAL: "30"
    ports:
      - "8058:8058"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8058/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.20
    depends_on:
      - memu-core
      - tool-gate

  audio-service:
    build:
      context: .
      dockerfile: perception/audio/Dockerfile
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
      WHISPER_BACKEND: "local"
      WHISPER_MODEL: "tiny"
      AUTO_MEMORIZE_AUDIO: "true"
    ports:
      - "8021:8021"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8021/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.13
    depends_on:
      - memu-core

  camera-service:
    build:
      context: .
      dockerfile: perception/camera/Dockerfile
    <<: *defaults
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8020/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.14

  kai-advisor:
    build:
      context: .
      dockerfile: kai-advisor/Dockerfile
    <<: *defaults
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.15

  tts-service:
    build:
      context: .
      dockerfile: output/tts/Dockerfile
    <<: *defaults
    environment:
      TTS_BACKEND: "edge"
      TTS_VOICE: "en-GB-RyanNeural"
    ports:
      - "8030:8030"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8030/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.16

  avatar-service:
    build:
      context: .
      dockerfile: output/avatar/Dockerfile
    <<: *defaults
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8081/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.17

  screen-capture:
    build:
      context: .
      dockerfile: screen-capture/Dockerfile
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
    ports:
      - "8059:8059"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8059/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.21
    depends_on:
      - memu-core

  backup-service:
    build:
      context: .
      dockerfile: backup-service/Dockerfile
    <<: *defaults
    environment:
      PG_URI: postgresql://keeper:localdev@postgres:5432/sovereign
      REDIS_URL: redis://redis:6379
      MEMU_URL: http://memu-core:8001
      TOOL_GATE_URL: http://tool-gate:8000
    secrets:
      - db_password
    ports:
      - "8054:8054"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8054/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.22
    depends_on:
      - postgres
      - redis

  calendar-sync:
    build:
      context: .
      dockerfile: calendar-sync/Dockerfile
    <<: *defaults
    ports:
      - "8055:8055"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8055/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.23

  ollama:
    image: ollama/ollama:latest
    <<: *defaults
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.30

  telegram-bot:
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    <<: *defaults
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      LANGGRAPH_URL: http://langgraph:8007
      AUDIO_SERVICE_URL: http://audio-service:8021
      TTS_SERVICE_URL: http://tts-service:8030
      TTS_ENABLED: "true"
      DEFAULT_MODE: "PUB"
      ALLOWED_CHAT_IDS: "${ALLOWED_CHAT_IDS:-}"
    ports:
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8025/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.26
    depends_on:
      - langgraph
      - audio-service
      - tts-service

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    <<: *defaults
    environment:
      TOOL_GATE_URL: http://tool-gate:8000
      MEMU_URL: http://memu-core:8001
      VERIFIER_URL: http://verifier:8052
      EXECUTOR_URL: http://executor:8002
      OLLAMA_URL: http://ollama:11434
    ports:
      - "8050:8050"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8050/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.24
    depends_on:
      - tool-gate
      - memu-core
      - verifier
      - ollama

  workspace-manager:
    build:
      context: .
      dockerfile: workspace-manager/Dockerfile
    <<: *defaults
    ports:
      - "8060:8060"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8060/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.25

volumes:
  postgres_data:
  ollama_data:

# ── Docker Secrets (production) ──────────────────────────────────────
# Create runtime-secrets/ directory with secret files before deploying:
#   echo "my-hmac-secret" > runtime-secrets/hmac_secret
#   echo "my-db-password" > runtime-secrets/db_password
#   echo "my-bridge-secret" > runtime-secrets/bridge_secret
# Then set env vars to point to the mount path:
#   INTERSERVICE_HMAC_SECRET=/run/secrets/hmac_secret
# The common.auth.load_secret() function reads from the file automatically.
secrets:
  hmac_secret:
    file: ${SECRETS_DIR:-./runtime-secrets}/hmac_secret
  db_password:
    file: ${SECRETS_DIR:-./runtime-secrets}/db_password
  bridge_secret:
    file: ${SECRETS_DIR:-./runtime-secrets}/bridge_secret
