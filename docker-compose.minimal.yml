version: '3.8'

networks:
  sovereign-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ── Shared defaults ─────────────────────────────────────────────────
x-service-defaults: &defaults
  restart: unless-stopped
  deploy:
    resources:
      limits:
        cpus: '1.0'
        memory: 2G
  security_opt:
    - no-new-privileges:true

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: sovereign-postgres
    <<: *defaults
    environment:
      POSTGRES_DB: sovereign
      POSTGRES_USER: keeper
      POSTGRES_PASSWORD: "${DB_PASSWORD:-localdev}"
    volumes:
      - postgres_data:/var/lib/postgresql/data:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keeper -d sovereign"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.2

  redis:
    image: redis:7-alpine
    container_name: sovereign-redis
    <<: *defaults
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.4

  ollama:
    image: ollama/ollama:latest
    container_name: sovereign-ollama
    <<: *defaults
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.11

  ollama-pull:
    image: ollama/ollama:latest
    container_name: sovereign-ollama-pull
    restart: "no"
    entrypoint: ["sh", "-c", "OLLAMA_HOST=ollama:11434 ollama pull ${OLLAMA_MODEL:-qwen2:0.5b}"]
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.13

  tool-gate:
    build:
      context: .
      dockerfile: tool-gate/Dockerfile
    container_name: sovereign-tool-gate
    <<: *defaults
    environment:
      MODE: "WORK"
      REQUIRED_CONVICTION: "7.0"
      NONCE_TTL_SECONDS: "300"
      HMAC_ALLOW_DEV_SECRET: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.3
    depends_on:
      postgres:
        condition: service_healthy

  memu-core:
    build:
      context: .
      dockerfile: memu-core/Dockerfile
    container_name: sovereign-memu-core
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
      MAX_MEMORY_RECORDS: "5000"
      VECTOR_STORE: postgres
      PG_URI: "postgresql://keeper:${DB_PASSWORD:-localdev}@postgres:5432/sovereign"
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.5
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  memu-core-introspect:
    build:
      context: .
      dockerfile: memu-core/Dockerfile.introspect
    container_name: sovereign-memu-core-introspect
    <<: *defaults
    environment:
      VECTOR_STORE: postgres
      PG_URI: "postgresql://keeper:${DB_PASSWORD:-localdev}@postgres:5432/sovereign"
    ports:
      - "8009:8009"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8009/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.14
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  agentic:
    build:
      context: .
      dockerfile: agentic/Dockerfile
    container_name: sovereign-agentic
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
      TOOL_GATE_URL: http://tool-gate:8000
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2:0.5b}"
      LLM_TIMEOUT: "120"
      WAKE_URL: http://wake-service:8022
      FF_WAKE_INTENT_ROUTING: "${FF_WAKE_INTENT_ROUTING:-false}"
      HMAC_ALLOW_DEV_SECRET: "true"
    ports:
      - "8007:8007"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8007/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.12
    depends_on:
      memu-core:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  heartbeat:
    build:
      context: .
      dockerfile: heartbeat/Dockerfile
    container_name: sovereign-heartbeat
    <<: *defaults
    environment:
      MEMU_INTROSPECT_URL: http://memu-core-introspect:8009
      CHECK_INTERVAL: "60"
      ALERT_WINDOW: "300"
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.6
    depends_on:
      memu-core:
        condition: service_healthy
      memu-core-introspect:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: sovereign-dashboard
    <<: *defaults
    environment:
      TOOL_GATE_URL: http://tool-gate:8000
      MEMU_URL: http://memu-core:8001
      MEMU_INTROSPECT_URL: http://memu-core-introspect:8009
      HEARTBEAT_URL: http://heartbeat:8010
      SUPERVISOR_URL: http://supervisor:8051
      WAKE_URL: http://wake-service:8022
      LANGGRAPH_URL: http://agentic:8007
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.7
    depends_on:
      tool-gate:
        condition: service_healthy
      memu-core:
        condition: service_healthy
      memu-core-introspect:
        condition: service_healthy
      heartbeat:
        condition: service_healthy
      supervisor:
        condition: service_started
      wake-service:
        condition: service_started
      agentic:
        condition: service_started

  wake-service:
    build:
      context: .
      dockerfile: perception/wake/Dockerfile
    container_name: sovereign-wake-service
    <<: *defaults
    environment:
      OLLAMA_URL: http://ollama:11434
      WAKE_WORDS: "${WAKE_WORDS:-kai,hey kai,ok kai}"
      WAKE_COOLDOWN_SECONDS: "${WAKE_COOLDOWN_SECONDS:-2}"
      WAKE_INTENT_MODEL: "${WAKE_INTENT_MODEL:-qwen2:0.5b}"
      WAKE_CONFIDENCE_THRESHOLD: "${WAKE_CONFIDENCE_THRESHOLD:-0.6}"
    ports:
      - "8022:8022"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8022/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.10
    depends_on:
      memu-core:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  supervisor:
    build:
      context: .
      dockerfile: supervisor/Dockerfile
    container_name: sovereign-supervisor
    <<: *defaults
    environment:
      TOOL_GATE_URL: http://tool-gate:8000
      MEMU_URL: http://memu-core:8001
      HEARTBEAT_URL: http://heartbeat:8010
      DASHBOARD_URL: http://dashboard:8080
      SUPERVISOR_CHECK_INTERVAL: "15"
    ports:
      - "8051:8051"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8051/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.8
    depends_on:
      tool-gate:
        condition: service_healthy
      memu-core:
        condition: service_healthy
      heartbeat:
        condition: service_healthy

  verifier:
    build:
      context: .
      dockerfile: verifier/Dockerfile
    container_name: sovereign-verifier
    <<: *defaults
    environment:
      MEMU_URL: http://memu-core:8001
    ports:
      - "8052:8052"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8052/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      sovereign-net:
        ipv4_address: 172.20.0.9
    depends_on:
      memu-core:
        condition: service_healthy

volumes:
  postgres_data:
  ollama_data:
